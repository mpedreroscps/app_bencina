<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="theme-color" content="#FAF7F0">
<title>Bencina Compartida</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #FAF7F0;
    -webkit-font-smoothing: antialiased;
  }
  .font-display { font-family: 'Fraunces', Georgia, serif; }
  .font-body { font-family: 'DM Sans', system-ui, sans-serif; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useMemo } = React;

// ==================== ICONS ====================
const Icon = ({ children, className = "w-4 h-4", strokeWidth = 2 }) => (
  <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
    {children}
  </svg>
);
const FuelIcon = (p) => <Icon {...p}><line x1="3" y1="22" x2="15" y2="22"/><line x1="4" y1="9" x2="14" y2="9"/><path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"/><path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2h0a2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"/></Icon>;
const PlusIcon = (p) => <Icon {...p}><path d="M12 5v14"/><path d="M5 12h14"/></Icon>;
const XIcon = (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
const WalletIcon = (p) => <Icon {...p}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></Icon>;
const ReceiptIcon = (p) => <Icon {...p}><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5v-11"/></Icon>;
const AlertIcon = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></Icon>;
const RefreshIcon = (p) => <Icon {...p}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></Icon>;

// ==================== APP ====================
function BencinaApp() {
  const [config, setConfig] = useState({ url: '', key: '' });
  const [connected, setConnected] = useState(false);
  const [connecting, setConnecting] = useState(false);
  const [conductores, setConductores] = useState([]);
  const [viajes, setViajes] = useState([]);
  const [cargas, setCargas] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [showViaje, setShowViaje] = useState(false);
  const [showCarga, setShowCarga] = useState(false);

  const initialViaje = () => ({
    conductor_id: '', monto_clp: '', fecha: new Date().toISOString().slice(0, 10),
    descripcion: '', es_para_otra_persona: false, a_cuenta_de: ''
  });
  const [viajeForm, setViajeForm] = useState(initialViaje());

  const initialCarga = () => ({
    monto_clp: '', tipo: 'inicio_mes', quien_pago_id: '',
    fecha: new Date().toISOString().slice(0, 10)
  });
  const [cargaForm, setCargaForm] = useState(initialCarga());

  const supaFetch = async (path, options = {}) => {
    const baseUrl = config.url.replace(/\/$/, '').trim();
    const key = config.key.trim();
    const res = await fetch(`${baseUrl}/rest/v1/${path}`, {
      ...options,
      headers: {
        apikey: key,
        Authorization: `Bearer ${key}`,
        'Content-Type': 'application/json',
        Prefer: 'return=representation',
        ...(options.headers || {})
      }
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`${res.status} — ${errText}`);
    }
    return res.json();
  };

  const fetchAll = async () => {
    setLoading(true); setError('');
    try {
      const [c, v, cg] = await Promise.all([
        supaFetch('conductores?select=*&order=id'),
        supaFetch('viajes?select=*&order=fecha.desc'),
        supaFetch('cargas?select=*&order=fecha.desc')
      ]);
      setConductores(c); setViajes(v); setCargas(cg);
    } catch (e) {
      setError(e.message);
    } finally { setLoading(false); }
  };

  const connect = async () => {
    setConnecting(true); setError('');
    try {
      const baseUrl = config.url.replace(/\/$/, '').trim();
      const key = config.key.trim();
      const res = await fetch(`${baseUrl}/rest/v1/conductores?select=*&limit=1`, {
        headers: { apikey: key, Authorization: `Bearer ${key}` }
      });
      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`No se pudo conectar (${res.status}). ${errText.slice(0, 200)}`);
      }
      setConnected(true);
      await fetchAll();
    } catch (e) {
      setError(e.message);
    } finally { setConnecting(false); }
  };

  const saveViaje = async () => {
    if (!viajeForm.conductor_id || !viajeForm.monto_clp) {
      setError('Selecciona conductor y monto'); return;
    }
    setLoading(true); setError('');
    try {
      await supaFetch('viajes', {
        method: 'POST',
        body: JSON.stringify({
          conductor_id: parseInt(viajeForm.conductor_id),
          monto_clp: parseInt(viajeForm.monto_clp),
          fecha: viajeForm.fecha,
          descripcion: viajeForm.descripcion || null,
          es_para_otra_persona: viajeForm.es_para_otra_persona,
          a_cuenta_de: viajeForm.es_para_otra_persona ? viajeForm.a_cuenta_de : null
        })
      });
      setShowViaje(false); setViajeForm(initialViaje());
      await fetchAll();
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const saveCarga = async () => {
    if (!cargaForm.quien_pago_id || !cargaForm.monto_clp) {
      setError('Selecciona quién pagó y monto'); return;
    }
    setLoading(true); setError('');
    try {
      await supaFetch('cargas', {
        method: 'POST',
        body: JSON.stringify({
          monto_clp: parseInt(cargaForm.monto_clp),
          tipo: cargaForm.tipo,
          quien_pago_id: parseInt(cargaForm.quien_pago_id),
          fecha: cargaForm.fecha
        })
      });
      setShowCarga(false); setCargaForm(initialCarga());
      await fetchAll();
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const formatCLP = (n) => '$' + (n || 0).toLocaleString('es-CL');

  const saldos = useMemo(() => conductores.map(c => {
    const aportes = cargas.filter(carga => carga.quien_pago_id === c.id).reduce((a, b) => a + b.monto_clp, 0);
    const consumo = viajes.filter(v => v.conductor_id === c.id && !v.es_para_otra_persona).reduce((a, b) => a + b.monto_clp, 0);
    return { ...c, aportes, consumo, saldo: aportes - consumo };
  }), [conductores, viajes, cargas]);

  const totalCargado = cargas.reduce((a, b) => a + b.monto_clp, 0);
  const totalConsumido = viajes.reduce((a, b) => a + b.monto_clp, 0);
  const restante = totalCargado - totalConsumido;
  const proximo = saldos.length ? [...saldos].sort((a, b) => a.saldo - b.saldo)[0] : null;

  const deudasExternas = useMemo(() => {
    const map = {};
    viajes.filter(v => v.es_para_otra_persona && v.a_cuenta_de).forEach(v => {
      map[v.a_cuenta_de] = (map[v.a_cuenta_de] || 0) + v.monto_clp;
    });
    return Object.entries(map).map(([n, m]) => ({ nombre: n, monto: m }));
  }, [viajes]);

  const movimientos = useMemo(() => {
    const m = [
      ...viajes.map(v => ({ tipo: 'viaje', id: 'v' + v.id, fecha: v.fecha, monto: v.monto_clp,
        conductor_id: v.conductor_id, descripcion: v.descripcion,
        es_para_otra_persona: v.es_para_otra_persona, a_cuenta_de: v.a_cuenta_de })),
      ...cargas.map(c => ({ tipo: 'carga', id: 'c' + c.id, fecha: c.fecha, monto: c.monto_clp,
        conductor_id: c.quien_pago_id, descripcion: c.tipo }))
    ];
    return m.sort((a, b) => b.fecha.localeCompare(a.fecha)).slice(0, 20);
  }, [viajes, cargas]);

  // ========== SETUP ==========
  if (!connected) {
    return (
      <div className="min-h-screen w-full font-body" style={{ background: '#FAF7F0' }}>
        <div className="max-w-md mx-auto px-6 pt-16 pb-12">
          <div className="text-center mb-10">
            <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-6 shadow-sm" style={{ background: '#E76F51' }}>
              <FuelIcon className="w-8 h-8 text-white" />
            </div>
            <h1 className="font-display" style={{ fontWeight: 600, fontSize: '2.5rem', lineHeight: 1, letterSpacing: '-0.03em' }}>
              Bencina<br />
              <span className="italic" style={{ color: '#E76F51' }}>Compartida</span>
            </h1>
            <p className="mt-4 text-stone-600 text-sm">Conecta tu Supabase para empezar</p>
          </div>
          <div className="bg-white rounded-2xl p-6 shadow-sm border border-stone-200">
            <div className="space-y-4">
              <div>
                <label className="block text-xs font-semibold text-stone-700 mb-1.5 uppercase tracking-widest">Project URL</label>
                <input type="text" placeholder="https://xxxxx.supabase.co"
                  value={config.url} onChange={e => setConfig({ ...config, url: e.target.value })}
                  className="w-full px-4 py-2.5 rounded-lg border border-stone-300 focus:border-stone-900 focus:outline-none text-sm font-body" />
              </div>
              <div>
                <label className="block text-xs font-semibold text-stone-700 mb-1.5 uppercase tracking-widest">anon public key</label>
                <input type="password" placeholder="eyJhbGc..."
                  value={config.key} onChange={e => setConfig({ ...config, key: e.target.value })}
                  className="w-full px-4 py-2.5 rounded-lg border border-stone-300 focus:border-stone-900 focus:outline-none text-sm font-body" />
              </div>
              {error && (
                <div className="flex gap-2 p-3 bg-red-50 border border-red-200 rounded-lg text-xs text-red-800">
                  <AlertIcon className="w-4 h-4 flex-shrink-0 mt-0.5" />
                  <span className="break-words">{error}</span>
                </div>
              )}
              <button onClick={connect} disabled={connecting || !config.url || !config.key}
                className="w-full py-3 rounded-lg text-white font-medium text-sm transition-all disabled:opacity-40 hover:opacity-90"
                style={{ background: '#1c1917' }}>
                {connecting ? 'Conectando...' : 'Conectar →'}
              </button>
            </div>
          </div>
          <p className="text-xs text-stone-500 text-center mt-6 leading-relaxed">
            Ambos datos están en Supabase →<br />
            <span className="font-medium text-stone-700">Settings → API</span>
          </p>
        </div>
      </div>
    );
  }

  // ========== MAIN ==========
  return (
    <div className="min-h-screen w-full pb-32 font-body" style={{ background: '#FAF7F0' }}>
      <header className="px-5 pt-8 pb-6">
        <div className="flex items-end justify-between mb-1">
          <h1 className="font-display" style={{ fontWeight: 600, fontSize: '1.75rem', letterSpacing: '-0.02em', lineHeight: 1 }}>
            Bencina <span className="italic" style={{ color: '#E76F51' }}>Compartida</span>
          </h1>
          <button onClick={fetchAll} disabled={loading}
            className="text-xs text-stone-600 hover:text-stone-900 flex items-center gap-1 disabled:opacity-50">
            <RefreshIcon className={`w-3 h-3 ${loading ? 'animate-spin' : ''}`} />
            {loading ? '' : 'Actualizar'}
          </button>
        </div>
        <p className="text-xs text-stone-500 mt-2">{conductores.map(c => c.nombre).join(' · ')}</p>
      </header>

      <div className="px-5">
        {/* Hero */}
        <div className="rounded-3xl p-6 mb-4 relative overflow-hidden" style={{ background: '#1c1917' }}>
          <div className="absolute top-0 right-0 w-48 h-48 rounded-full" style={{ background: '#E9C46A', opacity: 0.18, transform: 'translate(35%, -35%)', filter: 'blur(2px)' }} />
          <div className="absolute bottom-0 left-0 w-32 h-32 rounded-full" style={{ background: '#E76F51', opacity: 0.1, transform: 'translate(-40%, 40%)', filter: 'blur(4px)' }} />
          <div className="relative">
            <div className="flex items-center gap-2 text-stone-400 text-xs uppercase tracking-widest mb-3 font-semibold">
              <FuelIcon className="w-3.5 h-3.5" />Bencina restante
            </div>
            <div className="text-white font-display" style={{ fontWeight: 500, fontSize: '3rem', lineHeight: 1, letterSpacing: '-0.03em' }}>
              {formatCLP(restante)}
            </div>
            <div className="mt-5 flex items-center gap-5 text-xs">
              <div>
                <span className="block text-stone-500 uppercase tracking-wider mb-0.5" style={{fontSize:'10px'}}>cargado</span>
                <span className="text-stone-200 font-medium text-sm">{formatCLP(totalCargado)}</span>
              </div>
              <div className="w-px h-9 bg-stone-700" />
              <div>
                <span className="block text-stone-500 uppercase tracking-wider mb-0.5" style={{fontSize:'10px'}}>consumido</span>
                <span className="text-stone-200 font-medium text-sm">{formatCLP(totalConsumido)}</span>
              </div>
            </div>
          </div>
        </div>

        {/* Próximo */}
        {proximo && proximo.saldo < 0 && (
          <div className="rounded-2xl p-4 mb-4 flex items-center justify-between bg-white" style={{ border: `2px solid ${proximo.color}` }}>
            <div>
              <div className="uppercase tracking-widest text-stone-500 mb-1 font-semibold" style={{fontSize:'10px'}}>Próximo en cargar</div>
              <div className="font-display" style={{ color: proximo.color, fontWeight: 600, fontSize: '1.5rem', letterSpacing: '-0.01em' }}>
                {proximo.nombre}
              </div>
              <div className="text-xs text-stone-600 mt-0.5">debe {formatCLP(Math.abs(proximo.saldo))}</div>
            </div>
            <div className="w-12 h-12 rounded-full flex items-center justify-center" style={{ background: proximo.color }}>
              <FuelIcon className="w-5 h-5 text-white" />
            </div>
          </div>
        )}

        {/* Saldos */}
        <div className="bg-white rounded-2xl border border-stone-200 mb-4 overflow-hidden">
          <div className="px-5 pt-4 pb-2 uppercase tracking-widest text-stone-500 flex items-center gap-1.5 font-semibold" style={{fontSize:'10px'}}>
            <WalletIcon className="w-3 h-3" />Saldos
          </div>
          {saldos.map((s, i) => (
            <div key={s.id} className={`px-5 py-4 flex items-center justify-between ${i < saldos.length - 1 ? 'border-b border-stone-100' : ''}`}>
              <div className="flex items-center gap-3">
                <div className="w-1.5 h-11 rounded-full" style={{ background: s.color }} />
                <div>
                  <div className="font-medium text-stone-900">{s.nombre}</div>
                  <div className="text-xs text-stone-500 mt-0.5">
                    {formatCLP(s.aportes)} aportado · {formatCLP(s.consumo)} usado
                  </div>
                </div>
              </div>
              <div className="text-right">
                <div className={`font-display ${s.saldo < 0 ? 'text-red-600' : s.saldo > 0 ? 'text-emerald-700' : 'text-stone-600'}`} style={{ fontWeight: 600, fontSize: '1.125rem', letterSpacing: '-0.01em' }}>
                  {s.saldo >= 0 ? '+' : ''}{formatCLP(s.saldo)}
                </div>
                <div className="text-stone-500 uppercase tracking-wider" style={{fontSize:'10px'}}>
                  {s.saldo < 0 ? 'debe' : s.saldo > 0 ? 'le deben' : 'al día'}
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* Deudas externas */}
        {deudasExternas.length > 0 && (
          <div className="bg-white rounded-2xl border border-stone-200 mb-4 overflow-hidden">
            <div className="px-5 pt-4 pb-2 uppercase tracking-widest text-stone-500 font-semibold" style={{fontSize:'10px'}}>Deudas externas</div>
            {deudasExternas.map((d, i) => (
              <div key={i} className={`px-5 py-3 flex items-center justify-between ${i < deudasExternas.length - 1 ? 'border-b border-stone-100' : ''}`}>
                <div className="text-stone-800 capitalize">{d.nombre}</div>
                <div className="font-medium text-stone-900">{formatCLP(d.monto)}</div>
              </div>
            ))}
          </div>
        )}

        {/* Movimientos */}
        <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
          <div className="px-5 pt-4 pb-2 uppercase tracking-widest text-stone-500 font-semibold" style={{fontSize:'10px'}}>Movimientos</div>
          {movimientos.length === 0 ? (
            <div className="px-5 py-8 text-center text-sm text-stone-500">
              <p>Aún sin movimientos.</p>
              <p className="text-xs mt-1">Toca + Viaje o Cargar para empezar</p>
            </div>
          ) : (
            movimientos.map((m, i) => {
              const conductor = conductores.find(c => c.id === m.conductor_id);
              return (
                <div key={m.id} className={`px-5 py-3 flex items-center gap-3 ${i < movimientos.length - 1 ? 'border-b border-stone-100' : ''}`}>
                  <div className="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style={{ background: m.tipo === 'carga' ? '#E9C46A' : conductor?.color || '#999' }}>
                    {m.tipo === 'carga' ? <PlusIcon className="w-4 h-4 text-stone-900" strokeWidth={2.5} /> : <FuelIcon className="w-4 h-4 text-white" />}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium text-stone-900 truncate">
                      {m.tipo === 'carga' ? `Carga · ${m.descripcion?.replace('_', ' ')}` : (m.descripcion || (m.es_para_otra_persona ? `Para ${m.a_cuenta_de}` : 'Viaje'))}
                    </div>
                    <div className="text-xs text-stone-500">
                      {conductor?.nombre} · {new Date(m.fecha + 'T12:00:00').toLocaleDateString('es-CL', { day: 'numeric', month: 'short' })}
                    </div>
                  </div>
                  <div className={`text-sm font-semibold ${m.tipo === 'carga' ? 'text-emerald-700' : 'text-stone-900'}`}>
                    {m.tipo === 'carga' ? '+' : '−'}{formatCLP(m.monto)}
                  </div>
                </div>
              );
            })
          )}
        </div>
      </div>

      {/* Botones */}
      <div className="fixed bottom-0 left-0 right-0 px-5 pb-6 pt-6" style={{ background: 'linear-gradient(to top, #FAF7F0 70%, rgba(250,247,240,0))' }}>
        <div className="max-w-md mx-auto flex gap-3">
          <button onClick={() => { setError(''); setShowCarga(true); }}
            className="flex-1 py-3.5 rounded-xl bg-white border-2 border-stone-900 font-medium text-sm text-stone-900 flex items-center justify-center gap-2 hover:bg-stone-50 transition-colors">
            <ReceiptIcon className="w-4 h-4" />Cargar
          </button>
          <button onClick={() => { setError(''); setShowViaje(true); }}
            className="flex-1 py-3.5 rounded-xl text-white font-medium text-sm flex items-center justify-center gap-2 hover:opacity-90 transition-opacity"
            style={{ background: '#1c1917' }}>
            <PlusIcon className="w-4 h-4" strokeWidth={2.5} />Viaje
          </button>
        </div>
      </div>

      {/* Modal Viaje */}
      {showViaje && (
        <Modal title="Registrar viaje" onClose={() => setShowViaje(false)}>
          <div className="space-y-4">
            <Field label="Conductor">
              <div className="grid grid-cols-3 gap-2">
                {conductores.map(c => (
                  <button key={c.id} onClick={() => setViajeForm({ ...viajeForm, conductor_id: c.id })}
                    className="py-2.5 rounded-lg text-sm font-medium border-2 transition-all"
                    style={{
                      borderColor: viajeForm.conductor_id === c.id ? c.color : '#e7e5e4',
                      background: viajeForm.conductor_id === c.id ? c.color : 'white',
                      color: viajeForm.conductor_id === c.id ? 'white' : '#1c1917'
                    }}>
                    {c.nombre}
                  </button>
                ))}
              </div>
            </Field>
            <Field label="Monto (CLP)">
              <input type="number" placeholder="20000" value={viajeForm.monto_clp}
                onChange={e => setViajeForm({ ...viajeForm, monto_clp: e.target.value })}
                className="w-full px-4 py-2.5 rounded-lg border border-stone-300 focus:border-stone-900 focus:outline-none font-body" />
            </Field>
            <Field label="Fecha">
              <input type="date" value={viajeForm.fecha}
                onChange={e => setViajeForm({ ...viajeForm, fecha: e.target.value })}
                className="w-full px-4 py-2.5 rounded-lg border border-stone-300 focus:border-stone-900 focus:outline-none font-body" />
            </Field>
            <Field label="Descripción (opcional)">
              <input type="text" placeholder="Ida al supermercado" value={viajeForm.descripcion}
                onChange={e => setViajeForm({ ...viajeForm, descripcion: e.target.value })}
                className="w-full px-4 py-2.5 rounded-lg border border-stone-300 focus:border-stone-900 focus:outline-none font-body" />
            </Field>
            <label className="flex items-center gap-2.5 cursor-pointer py-1">
              <input type="checkbox" checked={viajeForm.es_para_otra_persona}
                onChange={e => setViajeForm({ ...viajeForm, es_para_otra_persona: e.target.checked })}
                className="w-4 h-4 accent-stone-900" />
              <span className="text-sm text-stone-700">¿Manejé para otra persona?</span>
            </label>
            {viajeForm.es_para_otra_persona && (
              <Field label="A cuenta de">
                <input type="text" placeholder="Mamá, hermano, etc." value={viajeForm.a_cuenta_de}
                  onChange={e => setViajeForm({ ...viajeForm, a_cuenta_de: e.target.value })}
                  className="w-full px-4 py-2.5 rounded-lg border border-stone-300 focus:border-stone-900 focus:outline-none font-body" />
              </Field>
            )}
            {error && <ErrorBox msg={error} />}
            <button onClick={saveViaje} disabled={loading}
              className="w-full py-3 rounded-lg text-white font-medium disabled:opacity-40 hover:opacity-90 transition-opacity"
              style={{ background: '#1c1917' }}>
              {loading ? 'Guardando...' : 'Guardar viaje'}
            </button>
          </div>
        </Modal>
      )}

      {/* Modal Carga */}
      {showCarga && (
        <Modal title="Registrar carga" onClose={() => setShowCarga(false)}>
          <div className="space-y-4">
            <Field label="¿Quién pagó?">
              <div className="grid grid-cols-3 gap-2">
                {conductores.map(c => (
                  <button key={c.id} onClick={() => setCargaForm({ ...cargaForm, quien_pago_id: c.id })}
                    className="py-2.5 rounded-lg text-sm font-medium border-2 transition-all"
                    style={{
                      borderColor: cargaForm.quien_pago_id === c.id ? c.color : '#e7e5e4',
                      background: cargaForm.quien_pago_id === c.id ? c.color : 'white',
                      color: cargaForm.quien_pago_id === c.id ? 'white' : '#1c1917'
                    }}>
                    {c.nombre}
                  </button>
                ))}
              </div>
            </Field>
            <Field label="Monto (CLP)">
              <input type="number" placeholder="40000" value={cargaForm.monto_clp}
                onChange={e => setCargaForm({ ...cargaForm, monto_clp: e.target.value })}
                className="w-full px-4 py-2.5 rounded-lg border border-stone-300 focus:border-stone-900 focus:outline-none font-body" />
            </Field>
            <Field label="Tipo">
              <div className="grid grid-cols-3 gap-2">
                {[{v:'inicio_mes',l:'Inicio mes'},{v:'dia_20',l:'Día 20'},{v:'extra',l:'Extra'}].map(t => (
                  <button key={t.v} onClick={() => setCargaForm({ ...cargaForm, tipo: t.v })}
                    className={`py-2.5 rounded-lg text-sm font-medium border-2 transition-all ${cargaForm.tipo === t.v ? 'bg-stone-900 text-white border-stone-900' : 'bg-white text-stone-900 border-stone-200'}`}>
                    {t.l}
                  </button>
                ))}
              </div>
            </Field>
            <Field label="Fecha">
              <input type="date" value={cargaForm.fecha}
                onChange={e => setCargaForm({ ...cargaForm, fecha: e.target.value })}
                className="w-full px-4 py-2.5 rounded-lg border border-stone-300 focus:border-stone-900 focus:outline-none font-body" />
            </Field>
            {error && <ErrorBox msg={error} />}
            <button onClick={saveCarga} disabled={loading}
              className="w-full py-3 rounded-lg text-white font-medium disabled:opacity-40 hover:opacity-90 transition-opacity"
              style={{ background: '#1c1917' }}>
              {loading ? 'Guardando...' : 'Guardar carga'}
            </button>
          </div>
        </Modal>
      )}
    </div>
  );
}

function Modal({ title, children, onClose }) {
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center font-body" style={{ background: 'rgba(0,0,0,0.5)' }}>
      <div className="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl p-6 max-h-[90vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-5">
          <h2 className="font-display" style={{ fontWeight: 600, fontSize: '1.5rem', letterSpacing: '-0.01em' }}>{title}</h2>
          <button onClick={onClose} className="w-9 h-9 rounded-full bg-stone-100 flex items-center justify-center hover:bg-stone-200 transition-colors">
            <XIcon className="w-4 h-4" />
          </button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <label className="block font-semibold text-stone-700 mb-1.5 uppercase tracking-widest" style={{fontSize:'10px'}}>{label}</label>
      {children}
    </div>
  );
}

function ErrorBox({ msg }) {
  return (
    <div className="flex gap-2 p-3 bg-red-50 border border-red-200 rounded-lg text-xs text-red-800">
      <AlertIcon className="w-4 h-4 flex-shrink-0 mt-0.5" />
      <span className="break-words">{msg}</span>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BencinaApp />);
</script>
</body>
</html>
