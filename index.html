  const [y, m] = ym.split('-').map(Number);

};

// ==================== APP ROOT ====================
function BencinaApp() {
  const [session, setSession] = useState(null);
  const [miPersona, setMiPersona] = useState(null);
  const [loadingSession, setLoadingSession] = useState(true);

  useEffect(() => {
    supa.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setLoadingSession(false);
    });
    const { data: { subscription } } = supa.auth.onAuthStateChange((_event, newSession) => {
      setSession(newSession);
      if (!newSession) setMiPersona(null);
    });
    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!session) { setMiPersona(null); return; }
    (async () => {
      const { data, error } = await supa
        .from('personas')
        .select('*')
        .eq('user_id', session.user.id)
        .maybeSingle();
      if (!error && data) setMiPersona(data);
      else setMiPersona(null);
    })();
  }, [session]);

  if (SUPABASE_URL.includes('TU-PROYECTO') || SUPABASE_ANON_KEY.includes('TU_ANON_KEY')) {
    return <ConfigErrorScreen />;
  }
  if (loadingSession) {
    return <div className="min-h-screen flex items-center justify-center font-body text-stone-500 text-sm" style={{ background: '#FAF7F0' }}>Cargando...</div>;
  }
  if (!session) return <AuthScreen />;
  if (!miPersona) return <OnboardingScreen onJoined={(p) => setMiPersona(p)} />;
  return <MainApp session={session} miPersona={miPersona} onLogout={() => supa.auth.signOut()} />;
}

// ==================== LOGIN / SIGNUP ====================
function AuthScreen() {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [showPassword, setShowPassword] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [info, setInfo] = useState('');

  const submit = async () => {
    if (!email || !password) { setError('Completa email y contraseña'); return; }
    if (password.length < 6) { setError('La contraseña debe tener al menos 6 caracteres'); return; }
    setLoading(true); setError(''); setInfo('');
    try {
      if (mode === 'login') {
        const { error } = await supa.auth.signInWithPassword({ email, password });
        if (error) throw error;
      } else {
        const { data, error } = await supa.auth.signUp({ email, password });
        if (error) throw error;
        if (!data.session) setInfo('Revisa tu email para confirmar tu cuenta');
      }
    } catch (e) {
      setError(e.message || 'Error al autenticar');
    } finally { setLoading(false); }
  };

  return (
    <div className="min-h-screen w-full font-body" style={{ background: '#FAF7F0' }}>
      <div className="max-w-md mx-auto px-6 pt-16 pb-12">
        <div className="text-center mb-10">
          <div className="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-6 shadow-sm" style={{ background: '#E76F51' }}>
            <FuelIcon className="w-8 h-8 text-white" />
          </div>
          <h1 className="font-display" style={{ fontWeight: 600, fontSize: '2.5rem', lineHeight: 1, letterSpacing: '-0.03em' }}>
            Bencina<br /><span className="italic" style={{ color: '#E76F51' }}>Compartida</span>
          </h1>
        </div>

        <div className="flex bg-stone-100 rounded-xl p-1 mb-5">
          <button onClick={() => { setMode('login'); setError(''); setInfo(''); }} className={`flex-1 py-2.5 rounded-lg text-sm font-medium transition-colors ${mode === 'login' ? 'bg-white shadow-sm' : 'text-stone-600'}`}>Iniciar sesión</button>
          <button onClick={() => { setMode('signup'); setError(''); setInfo(''); }} className={`flex-1 py-2.5 rounded-lg text-sm font-medium transition-colors ${mode === 'signup' ? 'bg-white shadow-sm' : 'text-stone-600'}`}>Crear cuenta</button>
        </div>

        <div className="bg-white rounded-2xl p-6 shadow-sm border border-stone-200 space-y-4">
          <div>
            <label className="block text-xs font-semibold text-stone-700 mb-1.5 uppercase tracking-widest">Email</label>
            <input type="email" placeholder="tu@email.com" value={email} onChange={e => setEmail(e.target.value)} className="w-full px-4 py-2.5 rounded-lg border border-stone-300 focus:border-stone-900 focus:outline-none text-sm font-body" />
          </div>
          <div>
            <label className="block text-xs font-semibold text-stone-700 mb-1.5 uppercase tracking-widest">Contraseña</label>
            <div className="relative">
              <input type={showPassword ? "text" : "password"} placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} className="w-full px-4 py-2.5 pr-11 rounded-lg border border-stone-300 focus:border-stone-900 focus:outline-none text-sm font-body" onKeyDown={e => e.key === 'Enter' && submit()} />
              <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 text-stone-500 hover:text-stone-800">
                {showPassword ? <EyeOffIcon className="w-4 h-4" /> : <EyeIcon className="w-4 h-4" />}
              </button>
            </div>
            {mode === 'signup' && <p className="text-xs text-stone-500 mt-1">Mínimo 6 caracteres</p>}
          </div>
          {error && <ErrorBox msg={error} />}
          {info && <div className="text-xs text-emerald-800 bg-emerald-50 border border-emerald-200 rounded-lg p-3">{info}</div>}
          <button onClick={submit} disabled={loading || !email || !password} className="w-full py-3 rounded-lg text-white font-medium text-sm transition-all disabled:opacity-40 hover:opacity-90" style={{ background: '#1c1917' }}>
            {loading ? 'Cargando...' : (mode === 'login' ? 'Iniciar sesión →' : 'Crear cuenta →')}
          </button>
        </div>
      </div>
    </div>
  );
}

            <div className="flex gap-2 flex-wrap">
              {COLORES_DISPONIBLES.map(c => (
                <button key={c} onClick={() => setColor(c)} className={`w-8 h-8 rounded-full border-2 ${color === c ? 'ring-2 ring-offset-2 ring-stone-900 border-white' : 'border-white'}`} style={{ background: c }} />
              ))}
            </div>
          </Field>
          {error && <ErrorBox msg={error} />}
          <button onClick={submit} disabled={loading} className="w-full py-3 rounded-lg text-white font-medium disabled:opacity-40 hover:opacity-90" style={{ background: '#1c1917' }}>
            {loading ? 'Creando...' : 'Crear garage →'}
          </button>
        </div>
      </div>
    </div>
  );
}

function UnirseGarageScreen({ onJoined, onBack }) {
  const [step, setStep] = useState('codigo');
  const [code, setCode] = useState('');
  const [garage, setGarage] = useState(null);
  const [personasDisponibles, setPersonasDisponibles] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [reclamarId, setReclamarId] = useState(null);
  const [nuevaForm, setNuevaForm] = useState({ nombre: '', tipo: 'conductor', color: '#E76F51' });
  const [creandoNueva, setCreandoNueva] = useState(false);

  const validarCodigo = async () => {
    if (!code.trim()) { setError('Ingresa el código'); return; }
    setLoading(true); setError('');
    try {
      const { data, error: err } = await supa.rpc('info_garage_por_codigo', {
        p_invite_code: code.trim().toUpperCase()
      });
      if (err) throw err;
      setGarage(data.garage);
      setPersonasDisponibles(data.personas_disponibles || []);
      setStep('elegir');
    } catch (e) {
      setError(e.message?.includes('Código inválido') ? 'Código inválido' : (e.message || 'Error al validar el código'));
    }
    finally { setLoading(false); }
  };

  const unirme = async (personaId = null) => {
    setLoading(true); setError('');
    try {
      const params = personaId
        ? { p_invite_code: code.trim().toUpperCase(), p_persona_id: personaId }
        : { p_invite_code: code.trim().toUpperCase(), p_nombre: nuevaForm.nombre.trim(), p_color: nuevaForm.color, p_tipo: nuevaForm.tipo };
      const { data, error } = await supa.rpc('unirse_a_garage', params);
      if (error) throw error;
      const { data: persona } = await supa.from('personas').select('*').eq('id', data.persona_id).single();
      onJoined(persona);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  if (step === 'codigo') {
    return (
      <div className="min-h-screen w-full font-body" style={{ background: '#FAF7F0' }}>
        <div className="max-w-md mx-auto px-6 pt-16 pb-12">
          <button onClick={onBack} className="text-sm text-stone-600 mb-6">← Volver</button>
          <h1 className="font-display mb-6" style={{ fontWeight: 600, fontSize: '1.75rem', letterSpacing: '-0.02em' }}>Unirme con código</h1>
          <div className="bg-white rounded-2xl p-6 border border-stone-200 space-y-4">
            <Field label="Código de invitación">
              <input type="text" placeholder="Ej: ABC12345" value={code} onChange={e => setCode(e.target.value.toUpperCase())} className="w-full px-4 py-3 rounded-lg border-2 border-stone-300 focus:border-stone-900 focus:outline-none font-display text-xl font-semibold text-center tracking-widest" />
            </Field>
            {error && <ErrorBox msg={error} />}
            <button onClick={validarCodigo} disabled={loading || !code.trim()} className="w-full py-3 rounded-lg text-white font-medium disabled:opacity-40 hover:opacity-90" style={{ background: '#1c1917' }}>
              {loading ? 'Verificando...' : 'Continuar →'}
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-screen w-full font-body" style={{ background: '#FAF7F0' }}>
      <div className="max-w-md mx-auto px-6 pt-16 pb-12">
        <button onClick={() => setStep('codigo')} className="text-sm text-stone-600 mb-6">← Volver</button>
        <h1 className="font-display mb-2" style={{ fontWeight: 600, fontSize: '1.75rem', letterSpacing: '-0.02em' }}>¿Quién eres?</h1>
        {garage?.nombre && garage.nombre !== '...' && <p className="text-sm text-stone-600 mb-6">En el garage <span className="font-medium">{garage.nombre}</span></p>}

        {!creandoNueva ? (
          <div className="space-y-3">
            {personasDisponibles.length > 0 && (
              <>
                <div className="text-xs uppercase tracking-widest text-stone-500 font-semibold">Reclamar persona existente</div>
                {personasDisponibles.map(p => (
                  <button key={p.id} onClick={() => unirme(p.id)} disabled={loading} className="w-full bg-white rounded-xl p-4 text-left border border-stone-200 hover:border-stone-400 flex items-center gap-3 disabled:opacity-50">
                    <div className="w-2 h-9 rounded-full" style={{ background: p.color }} />
                    <div className="flex-1">
                      <div className="font-medium">{p.nombre}</div>
                      <div className="text-xs text-stone-500">{p.tipo === 'conductor' ? 'Conductor' : 'Hogar'}</div>
                    </div>
                    {p.tipo === 'conductor' ? <CarIcon className="w-4 h-4 text-stone-400" /> : <HomeIcon className="w-4 h-4 text-stone-400" />}
                  </button>
                ))}
                <div className="text-center text-xs text-stone-400 my-3">— o —</div>
              </>
            )}
            <button onClick={() => setCreandoNueva(true)} className="w-full bg-white rounded-xl p-4 text-center border-2 border-dashed border-stone-300 hover:border-stone-500">
              + Soy una persona nueva
            </button>
            {error && <ErrorBox msg={error} />}
          </div>
        ) : (
          <div className="bg-white rounded-2xl p-6 border border-stone-200 space-y-4">
            <button onClick={() => setCreandoNueva(false)} className="text-xs text-stone-500 mb-2">← Elegir persona existente</button>
            <Field label="Tu nombre">
              <input type="text" placeholder="Ej: Jesu" value={nuevaForm.nombre} onChange={e => setNuevaForm({ ...nuevaForm, nombre: e.target.value })} className="w-full px-4 py-2.5 rounded-lg border border-stone-300 focus:border-stone-900 focus:outline-none font-body" />
            </Field>
            <Field label="Tipo">
              <div className="grid grid-cols-2 gap-2">
                <button onClick={() => setNuevaForm({ ...nuevaForm, tipo: 'conductor' })} className={`py-2.5 rounded-lg text-sm font-medium border-2 flex items-center justify-center gap-1.5 ${nuevaForm.tipo === 'conductor' ? 'bg-stone-900 text-white border-stone-900' : 'bg-white text-stone-900 border-stone-200'}`}>
                  <CarIcon className="w-3.5 h-3.5" />Conductor
                </button>
                <button onClick={() => setNuevaForm({ ...nuevaForm, tipo: 'miembro_hogar' })} className={`py-2.5 rounded-lg text-sm font-medium border-2 flex items-center justify-center gap-1.5 ${nuevaForm.tipo === 'miembro_hogar' ? 'bg-stone-900 text-white border-stone-900' : 'bg-white text-stone-900 border-stone-200'}`}>
                  <HomeIcon className="w-3.5 h-3.5" />Hogar
                </button>
              </div>
            </Field>
            <Field label="Color">
              <div className="flex gap-2 flex-wrap">
                {COLORES_DISPONIBLES.map(c => (
                  <button key={c} onClick={() => setNuevaForm({ ...nuevaForm, color: c })} className={`w-8 h-8 rounded-full border-2 ${nuevaForm.color === c ? 'ring-2 ring-offset-2 ring-stone-900 border-white' : 'border-white'}`} style={{ background: c }} />
                ))}
              </div>
            </Field>
            {error && <ErrorBox msg={error} />}
            <button onClick={() => unirme(null)} disabled={loading || !nuevaForm.nombre.trim()} className="w-full py-3 rounded-lg text-white font-medium disabled:opacity-40 hover:opacity-90" style={{ background: '#1c1917' }}>
              {loading ? 'Uniéndome...' : 'Unirme al garage →'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ==================== MAIN APP ====================
function MainApp({ session, miPersona, onLogout }) {
  const garageId = miPersona.garage_id;
  const [garage, setGarage] = useState(null);
  const [personas, setPersonas] = useState([]);
  const [viajes, setViajes] = useState([]);
  const [cargas, setCargas] = useState([]);
  const [configuracion, setConfiguracion] = useState({ rendimiento_km_litro: null });

  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [toast, setToast] = useState(null);
  const [showViaje, setShowViaje] = useState(false);
  const [showCarga, setShowCarga] = useState(false);
  const [showPersonas, setShowPersonas] = useState(false);
  const [showCargaDetalles, setShowCargaDetalles] = useState(false);
  const [mostrarAcompanantes, setMostrarAcompanantes] = useState(false);
  const [confirmandoCierre, setConfirmandoCierre] = useState(false);
  const [editingViaje, setEditingViaje] = useState(null);
  const [editingCarga, setEditingCarga] = useState(null);

  // NUEVO: mes que se está visualizando en el dashboard (YYYY-MM)
  const mesActualSistema = new Date().toISOString().slice(0, 7);
  const [mesVisible, setMesVisible] = useState(mesActualSistema);

  // NUEVO: vista de perfil de una persona (null = dashboard)
  const [perfilPersonaId, setPerfilPersonaId] = useState(null);

  const today = () => new Date().toISOString().slice(0, 10);
  const initialCarga = () => ({ fecha: today(), tipo: 'inicio_mes', pagado_por_id: '', autonomia_despues: '', litros: '', monto_clp: '' });
  const initialViaje = () => ({ fecha: today(), conductor_id: '', km_recorridos: '', es_favor: false, para_quien_id: '', descripcion: '', acompanantes_ids: [] });
  const initialPersona = () => ({ nombre: '', tipo: 'miembro_hogar', color: '' });
  const [cargaForm, setCargaForm] = useState(initialCarga());
  const [viajeForm, setViajeForm] = useState(initialViaje());
  const [personaForm, setPersonaForm] = useState(initialPersona());

  const showToast = (msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 5000);
  };

  // ==================== FETCH ====================
  const fetchAll = async () => {
    setLoading(true); setError('');
    try {
      const [g, p, v, c, cfg] = await Promise.all([
        supa.from('garages').select('*').eq('id', garageId).single(),
        supa.from('personas').select('*').eq('garage_id', garageId).order('tipo').order('id'),
        supa.from('viajes').select('*').eq('garage_id', garageId).order('created_at', { ascending: false }),
        supa.from('cargas').select('*').eq('garage_id', garageId).order('created_at', { ascending: false }),
        supa.from('configuracion').select('*').eq('garage_id', garageId).maybeSingle()
      ]);
      if (g.error) throw g.error;
      if (p.error) throw p.error;
      setGarage(g.data);
      setPersonas(p.data || []);
      setViajes(v.data || []);
      setCargas(c.data || []);
      setConfiguracion(cfg.data || { rendimiento_km_litro: null, garage_id: garageId });
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  useEffect(() => { fetchAll(); }, [garageId]);

  // ==================== DERIVADOS ====================
  const conductores = useMemo(() => personas.filter(p => p.tipo === 'conductor'), [personas]);
  const miembros = useMemo(() => personas.filter(p => p.tipo === 'miembro_hogar'), [personas]);

  // Lista de meses con datos (para el selector), de más reciente a más antiguo.
  // Siempre incluye el mes actual del sistema, aunque no tenga datos todavía.
  const mesesConDatos = useMemo(() => {
    const set = new Set();
    cargas.forEach(c => set.add(c.fecha.slice(0, 7)));
    viajes.forEach(v => set.add(v.fecha.slice(0, 7)));
    set.add(mesActualSistema);
    return Array.from(set).sort().reverse();
  }, [cargas, viajes, mesActualSistema]);

  // ¿Estoy viendo el mes en curso o un mes histórico?
  const esMesActual = mesVisible === mesActualSistema;

  // Nivel físico del estanque (NO depende del mes — es el combustible real del auto)
  const nivelActual = useMemo(() => {
    if (cargas.length === 0) return 0;
    const ord = [...cargas].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    const ultima = ord[0];
    const ultimaTime = new Date(ultima.created_at);
    const consumido = viajes.filter(v => new Date(v.created_at) > ultimaTime).reduce((s, v) => s + Number(v.km_recorridos), 0);
    return Math.max(0, Number(ultima.autonomia_despues) - consumido);
  }, [cargas, viajes]);

  // NUEVO: contador del MES VISIBLE (parte de cero cada mes)
  const movimientoMes = useMemo(() => {
    const cargadoMes = cargas.filter(c => c.fecha.startsWith(mesVisible)).reduce((s, c) => s + Number(c.km_aportados), 0);
    const consumidoMes = viajes.filter(v => v.fecha.startsWith(mesVisible)).reduce((s, v) => s + Number(v.km_recorridos), 0);
    return { cargadoMes, consumidoMes };
  }, [cargas, viajes, mesVisible]);

  // Cálculo de balances de conductores PARA UN MES DADO (reutilizable)
  const calcularBalancesParaMes = (mes) => {
    const N = conductores.length;
    if (N === 0) return [];
    return conductores.map(c => {
      const cargasMes = cargas.filter(carga => carga.fecha.startsWith(mes));
      const aporte_propio = cargasMes.filter(carga => carga.pagado_por_id === c.id).reduce((s, carga) => s + Number(carga.km_aportados), 0);
      // $$ aportado en bencina EXTRA (solo cargas tipo 'extra' pagadas por este conductor)
      const clp_extra = cargasMes.filter(carga => carga.pagado_por_id === c.id && carga.tipo === 'extra').reduce((s, carga) => s + (Number(carga.monto_clp) || 0), 0);
      const aporte_recibido = cargasMes.filter(carga => {
        const p = personas.find(p => p.id === carga.pagado_por_id);
        return p?.tipo === 'miembro_hogar';
      }).reduce((s, carga) => s + Number(carga.km_aportados) / N, 0);
      const consumo_propio = viajes.filter(v => v.fecha.startsWith(mes) && !v.es_favor).reduce((sum, v) => {
        const acomp = v.acompanantes_ids || [];
        const involucrados = [v.conductor_id, ...acomp];
        if (involucrados.includes(c.id)) return sum + Number(v.km_recorridos) / involucrados.length;
        return sum;
      }, 0);
      const consumo_favor_compartido = viajes.filter(v => v.es_favor && v.fecha.startsWith(mes)).reduce((s, v) => s + Number(v.km_recorridos) / N, 0);
      const consumo = consumo_propio + consumo_favor_compartido;
      return { ...c, aporte_propio, aporte_recibido, clp_extra, consumo_propio, consumo_favor_compartido, consumo, balance: (aporte_propio + aporte_recibido) - consumo };
    });
  };

  // Balances del mes VISIBLE (lo que muestra el dashboard)
  const conductorBalances = useMemo(() => calcularBalancesParaMes(mesVisible), [conductores, personas, cargas, viajes, mesVisible]);

  const miembroAportes = useMemo(() => miembros.map(m => ({
    ...m,
    aportado: cargas.filter(c => c.pagado_por_id === m.id && c.fecha.startsWith(mesVisible)).reduce((s, c) => s + Number(c.km_aportados), 0),
    recibido: viajes.filter(v => v.es_favor && v.para_quien_id === m.id && v.fecha.startsWith(mesVisible)).reduce((s, v) => s + Number(v.km_recorridos), 0)
  })), [miembros, cargas, viajes, mesVisible]);

  const proximo = conductorBalances.length ? [...conductorBalances].sort((a, b) => a.balance - b.balance)[0] : null;

  // ==================== ACCIONES ====================
  const saveCarga = async () => {
    const usaRend = !!configuracion.rendimiento_km_litro;
    if (!cargaForm.pagado_por_id) { setError('Selecciona quién pagó'); return; }
    if (usaRend && !cargaForm.litros) { setError('Ingresa los litros'); return; }
    if (!usaRend && !cargaForm.autonomia_despues) { setError('Ingresa la autonomía después de cargar'); return; }
    setLoading(true); setError('');
    try {
      let km_aportados, autonomia_despues, litros;
      if (usaRend) {
        litros = parseFloat(cargaForm.litros);
        km_aportados = litros * Number(configuracion.rendimiento_km_litro);
        autonomia_despues = (editingCarga ? Number(editingCarga.autonomia_despues) : nivelActual) + km_aportados;
        if (editingCarga) {
          const nivelAntesOriginal = Number(editingCarga.autonomia_despues) - Number(editingCarga.km_aportados);
          autonomia_despues = nivelAntesOriginal + km_aportados;
        }
      } else {
        autonomia_despues = parseFloat(cargaForm.autonomia_despues);
        if (editingCarga) {
          const nivelAntesOriginal = Number(editingCarga.autonomia_despues) - Number(editingCarga.km_aportados);
          km_aportados = autonomia_despues - nivelAntesOriginal;
        } else {
          km_aportados = autonomia_despues - nivelActual;
        }
        litros = cargaForm.litros ? parseFloat(cargaForm.litros) : null;
      }
      const body = {
        fecha: cargaForm.fecha,
        tipo: cargaForm.tipo,
        pagado_por_id: parseInt(cargaForm.pagado_por_id),
        autonomia_despues,
        km_aportados,
        monto_clp: cargaForm.monto_clp ? parseInt(cargaForm.monto_clp) : null,
        litros
      };
      if (editingCarga) {
        body.updated_at = new Date().toISOString();
        body.updated_by_id = miPersona.id;
        const { error } = await supa.from('cargas').update(body).eq('id', editingCarga.id);
        if (error) throw error;
        showToast('Carga actualizada');
      } else {
        body.garage_id = garageId;
        const { error } = await supa.from('cargas').insert(body);
        if (error) throw error;
        const persona = personas.find(p => p.id === parseInt(cargaForm.pagado_por_id));
        if (persona?.tipo === 'miembro_hogar') {
          const N = conductores.length;
          const perC = N > 0 ? km_aportados / N : 0;
          showToast(`Aportaste ${formatKm(km_aportados)}. Se reparten entre ${N} conductores: ${formatKm(perC)} cada uno`);
        } else {
          showToast(`Aportaste ${formatKm(km_aportados)} al pool`);
        }
      }
      setShowCarga(false); setCargaForm(initialCarga()); setShowCargaDetalles(false); setEditingCarga(null);
      await fetchAll();
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const saveViaje = async () => {
    if (!viajeForm.conductor_id || !viajeForm.km_recorridos) { setError('Completa conductor y km'); return; }
    if (viajeForm.es_favor && !viajeForm.para_quien_id) { setError('Selecciona para quién es el favor'); return; }
    setLoading(true); setError('');
    try {
      const body = {
        fecha: viajeForm.fecha,
        conductor_id: parseInt(viajeForm.conductor_id),
        km_recorridos: parseFloat(viajeForm.km_recorridos),
        es_favor: viajeForm.es_favor,
        para_quien_id: viajeForm.es_favor ? parseInt(viajeForm.para_quien_id) : null,
        descripcion: viajeForm.descripcion || null,
        acompanantes_ids: viajeForm.es_favor ? [] : viajeForm.acompanantes_ids
      };
      if (editingViaje) {
        body.updated_at = new Date().toISOString();
        body.updated_by_id = miPersona.id;
        const { error } = await supa.from('viajes').update(body).eq('id', editingViaje.id);
        if (error) throw error;
        showToast('Viaje actualizado');
      } else {
        body.garage_id = garageId;
        const { error } = await supa.from('viajes').insert(body);
        if (error) throw error;
        const km = parseFloat(viajeForm.km_recorridos);
        if (viajeForm.es_favor) {
          const N = conductores.length;
          const perC = N > 0 ? km / N : 0;
          const pq = personas.find(p => p.id === parseInt(viajeForm.para_quien_id));
          showToast(`Favor de ${formatKm(km)} a ${pq?.nombre}. Se reparte entre ${N} conductores: ${formatKm(perC)} cada uno`);
        } else if (viajeForm.acompanantes_ids.length > 0) {
          const total = 1 + viajeForm.acompanantes_ids.length;
          showToast(`Viaje de ${formatKm(km)} compartido entre ${total} conductores: ${formatKm(km / total)} cada uno`);
        } else {
          showToast(`Viaje de ${formatKm(km)} registrado`);
        }
      }
      setShowViaje(false); setViajeForm(initialViaje()); setMostrarAcompanantes(false); setEditingViaje(null);
      await fetchAll();
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  // Estados para el modal de borrar
  const [deletingMovimiento, setDeletingMovimiento] = useState(null);
  const [deletePassword, setDeletePassword] = useState('');
  const [deleteError, setDeleteError] = useState('');

  // Estados para ajustar autonomía
  const [showAjuste, setShowAjuste] = useState(false);
  const [ajusteValor, setAjusteValor] = useState('');

  const requestDelete = (tipo, raw) => {
    const titulo = tipo === 'viaje'
      ? `viaje de ${formatKm(Number(raw.km_recorridos))}`
      : `carga de ${formatKm(Number(raw.km_aportados))}`;
    setDeletingMovimiento({ tipo, id: raw.id, titulo });
    setDeletePassword('');
    setDeleteError('');
  };

  const confirmDelete = async () => {
    if (deletePassword !== ADMIN_PASSWORD) {
      setDeleteError('Clave incorrecta');
      return;
    }
    setLoading(true);
    try {
      const { error } = await supa.from(deletingMovimiento.tipo === 'viaje' ? 'viajes' : 'cargas').delete().eq('id', deletingMovimiento.id);
      if (error) throw error;
      setDeletingMovimiento(null);
      setDeletePassword('');
      showToast('Movimiento borrado');
      await fetchAll();
    } catch (e) { setDeleteError(e.message); }
    finally { setLoading(false); }
  };

  const startEditViaje = (v) => {
    setEditingViaje(v);
    setViajeForm({
      fecha: v.fecha,
      conductor_id: v.conductor_id,
      km_recorridos: v.km_recorridos.toString(),
      es_favor: v.es_favor,
      para_quien_id: v.para_quien_id || '',
      descripcion: v.descripcion || '',
      acompanantes_ids: v.acompanantes_ids || []
    });
    setMostrarAcompanantes((v.acompanantes_ids || []).length > 0);
    setError(''); setShowViaje(true);
  };

  const startEditCarga = (c) => {
    setEditingCarga(c);
    setCargaForm({
      fecha: c.fecha,
      tipo: c.tipo,
      pagado_por_id: c.pagado_por_id,
      autonomia_despues: c.autonomia_despues?.toString() || '',
      litros: c.litros?.toString() || '',
      monto_clp: c.monto_clp?.toString() || ''
    });
    setError(''); setShowCarga(true);
  };

  const saveConfig = async (rendimiento) => {
    setLoading(true); setError('');
    try {
      const { error } = await supa.from('configuracion').update({
        rendimiento_km_litro: rendimiento ? parseFloat(rendimiento) : null,
        updated_at: new Date().toISOString()
      }).eq('garage_id', garageId);
      if (error) throw error;
      await fetchAll();
      showToast(rendimiento ? `Rendimiento: ${rendimiento} km/L` : 'Rendimiento desactivado');
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  // NUEVO: Cerrar mes — NO borra nada. Solo deja registro del cierre y limpia el panel
  // moviendo la vista al mes nuevo. El histórico queda intacto para los perfiles.
  const cerrarMes = async () => {
    setLoading(true); setError('');
    try {
      // Intentamos dejar un registro del cierre (tabla opcional 'cierres_mes').
      // Si la tabla no existe, no pasa nada: el cierre igual funciona.
      try {
        await supa.from('cierres_mes').insert({
          garage_id: garageId,
          mes: mesActualSistema,
          cerrado_por_id: miPersona.id,
          autonomia_al_cierre: nivelActual
        });
      } catch (_) { /* tabla opcional, ignoramos si no existe */ }

      setConfirmandoCierre(false);
      setShowPersonas(false);
      // El panel se "limpia" solo porque los cálculos filtran por mesVisible.
      // Nos aseguramos de estar mirando el mes en curso.
      setMesVisible(mesActualSistema);
      await fetchAll();
      showToast(`Mes cerrado. El historial quedó guardado en los perfiles. ✔`);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const savePersona = async () => {
    if (!personaForm.nombre.trim()) { setError('Ingresa un nombre'); return; }
    setLoading(true); setError('');
    try {
      const coloresUsados = personas.map(p => p.color);
      const colorAsignado = personaForm.color || COLORES_DISPONIBLES.find(c => !coloresUsados.includes(c)) || '#888';
      const { error } = await supa.from('personas').insert({
        nombre: personaForm.nombre.trim(),
        tipo: personaForm.tipo,
        color: colorAsignado,
        garage_id: garageId
      });
      if (error) throw error;
      const nombre = personaForm.nombre.trim();
      setPersonaForm(initialPersona());
      await fetchAll();
      showToast(`${nombre} agregada/o`);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const regenerarCodigo = async () => {
    if (!confirm('¿Regenerar código? El anterior dejará de funcionar.')) return;
    setLoading(true);
    try {
      const nuevo = Math.random().toString(36).substring(2, 10).toUpperCase();
      const { error } = await supa.from('garages').update({ invite_code: nuevo }).eq('id', garageId);
      if (error) throw error;
      await fetchAll();
      showToast('Código regenerado');
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const ajustarAutonomia = async () => {
    if (cargas.length === 0) { setError('Necesitas registrar al menos una carga antes de ajustar'); return; }
    if (ajusteValor === '' || parseFloat(ajusteValor) < 0) { setError('Ingresa un valor válido (km que marca el tablero)'); return; }
    setLoading(true); setError('');
    try {
      const ord = [...cargas].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      const ultima = ord[0];
      const ultimaTime = new Date(ultima.created_at);
      const consumidoPosterior = viajes
        .filter(v => new Date(v.created_at) > ultimaTime)
        .reduce((s, v) => s + Number(v.km_recorridos), 0);
      const nuevaAutonomia = parseFloat(ajusteValor) + consumidoPosterior;
      const nivelAntesUltimaCarga = Number(ultima.autonomia_despues) - Number(ultima.km_aportados);
      const nuevoKmAportados = nuevaAutonomia - nivelAntesUltimaCarga;
      const { error } = await supa.from('cargas').update({
        autonomia_despues: nuevaAutonomia,
        km_aportados: nuevoKmAportados,
        updated_at: new Date().toISOString(),
        updated_by_id: miPersona.id
      }).eq('id', ultima.id);
      if (error) throw error;
      setShowAjuste(false);
      setAjusteValor('');
      showToast(`Autonomía ajustada a ${formatKm(parseFloat(ajusteValor))}`);
      await fetchAll();
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  // ==================== HELPERS ====================
  const formatKm = (n) => {
    const num = Number(n) || 0;
    const rounded = Math.round(num * 10) / 10;
    return rounded.toLocaleString('es-CL', { minimumFractionDigits: 0, maximumFractionDigits: 1 }) + ' km';
  };
  const formatClp = (n) => '$' + (Number(n) || 0).toLocaleString('es-CL');
  const colorByLevel = (km) => km > 100 ? '#52796F' : km > 50 ? '#E9C46A' : '#BC4749';
  const labelByLevel = (km) => km > 100 ? 'óptimo' : km > 50 ? 'medio' : 'bajo';

  const nivelColor = colorByLevel(nivelActual);
  const maxConsumo = Math.max(...conductorBalances.map(c => c.consumo), 1);

  // ==================== RENDER ====================

  // Si estoy viendo un perfil, renderizo la pantalla de perfil
  if (perfilPersonaId !== null) {
    return (
      <PerfilPersona
        personaId={perfilPersonaId}
        personas={personas}
        conductores={conductores}
        cargas={cargas}
        viajes={viajes}
        miPersona={miPersona}
        mesActualSistema={mesActualSistema}
        calcularBalancesParaMes={calcularBalancesParaMes}
        formatKm={formatKm}
        formatClp={formatClp}
        onVerOtro={(id) => setPerfilPersonaId(id)}
        onBack={() => setPerfilPersonaId(null)}
      />
    );
  }

  return (
    <div className="min-h-screen w-full pb-32 font-body" style={{ background: '#FAF7F0' }}>
      {toast && (
        <div className="fixed top-3 left-3 right-3 z-[60] max-w-md mx-auto animate-slideDown">
          <div className="rounded-xl p-3 shadow-lg flex items-start gap-2.5 text-white text-sm" style={{ background: toast.type === 'error' ? '#BC4749' : '#1c1917' }}>
            <CheckIcon className="w-4 h-4 mt-0.5 flex-shrink-0" />
            <span className="flex-1">{toast.msg}</span>
            <button onClick={() => setToast(null)} className="opacity-70 hover:opacity-100"><XIcon className="w-3.5 h-3.5" /></button>
          </div>
        </div>
      )}

      <header className="px-5 pt-8 pb-4">
        <div className="flex items-end justify-between mb-1">
          <h1 className="font-display" style={{ fontWeight: 600, fontSize: '1.75rem', letterSpacing: '-0.02em', lineHeight: 1 }}>
            Bencina <span className="italic" style={{ color: '#E76F51' }}>Compartida</span>
          </h1>
          <div className="flex items-center gap-3">
            <button onClick={() => setShowPersonas(true)} className="text-stone-600 hover:text-stone-900"><SettingsIcon className="w-4 h-4" /></button>
            <button onClick={fetchAll} disabled={loading} className="text-xs text-stone-600 hover:text-stone-900 flex items-center gap-1 disabled:opacity-50">
              <RefreshIcon className={`w-3 h-3 ${loading ? 'animate-spin' : ''}`} />{loading ? '' : 'Actualizar'}
            </button>
          </div>
        </div>
        <p className="text-xs text-stone-500 mt-2">{garage?.nombre} · Hola, <span className="font-medium">{miPersona.nombre}</span></p>
      </header>

      {/* SELECTOR DE MES */}
      <div className="px-5 mb-3">
        <SelectorMes
          mesVisible={mesVisible}
          mesesConDatos={mesesConDatos}
          mesActualSistema={mesActualSistema}
          onSelect={setMesVisible}
        />
      </div>

      <div className="px-5">
        {/* HERO */}
        <div className="rounded-3xl p-6 mb-4 relative overflow-hidden" style={{ background: '#1c1917' }}>
          <div className="absolute top-0 right-0 w-48 h-48 rounded-full" style={{ background: nivelColor, opacity: 0.22, transform: 'translate(35%, -35%)', filter: 'blur(2px)' }} />
          <div className="absolute bottom-0 left-0 w-32 h-32 rounded-full" style={{ background: nivelColor, opacity: 0.1, transform: 'translate(-40%, 40%)', filter: 'blur(4px)' }} />
          <div className="relative">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2 text-stone-400 uppercase tracking-widest font-semibold" style={{ fontSize: '11px' }}>
                <FuelIcon className="w-3.5 h-3.5" />Quedan de autonomía
              </div>
              <button onClick={() => { setShowAjuste(true); setAjusteValor(Math.round(nivelActual).toString()); setError(''); }} className="text-stone-400 hover:text-stone-200 p-1" title="Ajustar autonomía">
                <EditIcon className="w-3.5 h-3.5" />
              </button>
            </div>
            <div className="font-display flex items-baseline gap-2 tabular-nums" style={{ color: nivelColor, fontWeight: 600, fontSize: '3.5rem', lineHeight: 1, letterSpacing: '-0.03em' }}>
              {Math.round(nivelActual).toLocaleString('es-CL')}
              <span className="text-stone-400 font-body" style={{ fontSize: '1.25rem', fontWeight: 500 }}>km</span>
            </div>
            <div className="mt-3 inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full" style={{ background: `${nivelColor}30` }}>
              <div className="w-1.5 h-1.5 rounded-full" style={{ background: nivelColor }} />
              <span className="text-xs uppercase tracking-wider font-medium" style={{ color: nivelColor }}>nivel {labelByLevel(nivelActual)}</span>
            </div>

            {/* NUEVO: contador del mes (parte de cero cada mes) */}
            <div className="mt-5 pt-4 border-t border-white/10 flex items-center gap-5">
              <div>
                <div className="text-stone-500 uppercase tracking-widest font-semibold" style={{ fontSize: '9px' }}>Cargado · {labelMesCorto(mesVisible)}</div>
                <div className="font-display tabular-nums" style={{ color: '#52796F', fontWeight: 600, fontSize: '1.25rem' }}>
                  +{Math.round(movimientoMes.cargadoMes).toLocaleString('es-CL')}<span className="text-stone-500 text-xs font-body ml-0.5">km</span>
                </div>
              </div>
              <div className="w-px h-8 bg-white/10" />
              <div>
                <div className="text-stone-500 uppercase tracking-widest font-semibold" style={{ fontSize: '9px' }}>Consumido · {labelMesCorto(mesVisible)}</div>
                <div className="font-display tabular-nums" style={{ color: '#E76F51', fontWeight: 600, fontSize: '1.25rem' }}>
                  −{Math.round(movimientoMes.consumidoMes).toLocaleString('es-CL')}<span className="text-stone-500 text-xs font-body ml-0.5">km</span>
                </div>
              </div>
            </div>
            {!esMesActual && (
              <div className="mt-3 text-amber-300/80 flex items-center gap-1.5" style={{ fontSize: '11px' }}>
                <ArchiveIcon className="w-3 h-3" />Viendo mes cerrado · la autonomía mostrada es la actual del auto
              </div>
            )}
          </div>
        </div>

        {/* PRÓXIMO EN CARGAR */}
        {proximo && proximo.balance < 0 && (
          <div className="rounded-2xl p-4 mb-4 flex items-center justify-between bg-white animate-fadeInUp" style={{ border: `2px solid ${proximo.color}` }}>
            <div>
              <div className="uppercase tracking-widest text-stone-500 mb-1 font-semibold" style={{ fontSize: '10px' }}>Próximo en cargar</div>
              <div className="font-display" style={{ color: proximo.color, fontWeight: 600, fontSize: '1.5rem', letterSpacing: '-0.01em' }}>{proximo.nombre}</div>
              <div className="text-xs text-stone-600 mt-0.5">debe {formatKm(Math.abs(proximo.balance))} este mes</div>
            </div>
            <div className="w-12 h-12 rounded-full flex items-center justify-center" style={{ background: proximo.color }}>
              <FuelIcon className="w-5 h-5 text-white" />
            </div>
          </div>
        )}

        {/* CONDUCTORES */}
        {conductorBalances.length > 0 && (
          <div className="bg-white rounded-2xl border border-stone-200 mb-4 overflow-hidden">
            <div className="px-5 pt-4 pb-2 uppercase tracking-widest text-stone-500 flex items-center gap-1.5 font-semibold" style={{ fontSize: '10px' }}>
              <CarIcon className="w-3 h-3" />Conductores · {labelMes(mesVisible)}
            </div>
            {conductorBalances.map((c, i) => (
              <button key={c.id} onClick={() => setPerfilPersonaId(c.id)} className={`w-full text-left px-5 py-3.5 hover:bg-stone-50 transition-colors ${i < conductorBalances.length - 1 ? 'border-b border-stone-100' : ''}`}>
                <div className="flex items-center justify-between mb-1">
                  <div className="flex items-center gap-2.5">
                    <div className="w-1.5 h-9 rounded-full" style={{ background: c.color }} />
                    <div className="font-medium text-stone-900 flex items-center gap-1.5">
                      {c.nombre}{c.id === miPersona.id && <span className="text-xs text-stone-500">(tú)</span>}
                      <UserIcon className="w-3 h-3 text-stone-300" />
                    </div>
                  </div>
                  <div className={`font-display tabular-nums ${c.balance < 0 ? 'text-red-600' : c.balance > 0 ? 'text-emerald-700' : 'text-stone-600'}`} style={{ fontWeight: 600, fontSize: '1.125rem', letterSpacing: '-0.01em' }}>
                    {c.balance >= 0 ? '+' : ''}{formatKm(c.balance)}
                  </div>
                </div>
                <div className="text-xs text-stone-500 ml-5">
                  aportó <span className="text-stone-700 font-medium">{formatKm(c.aporte_propio)}</span>
                  {' · '}recibió <span className="text-stone-700 font-medium">{formatKm(c.aporte_recibido)}</span>
                  {' · '}consumió <span className="text-stone-700 font-medium">{formatKm(c.consumo)}</span>
                  {c.consumo_favor_compartido > 0 && (
                    <div className="text-stone-400 italic mt-0.5" style={{ fontSize: '11px' }}>
                      ↳ {formatKm(c.consumo_propio)} propios + {formatKm(c.consumo_favor_compartido)} de favores compartidos
                    </div>
                  )}
                </div>
              </button>
            ))}
            <div className="px-5 pb-3 pt-1 text-stone-400 italic" style={{ fontSize: '11px' }}>
              Toca un conductor para ver su perfil histórico
            </div>
          </div>
        )}

        {/* HOGAR */}
        {miembroAportes.length > 0 && (
          <div className="bg-white rounded-2xl border border-stone-200 mb-4 overflow-hidden">
            <div className="px-5 pt-4 pb-2 uppercase tracking-widest text-stone-500 flex items-center gap-1.5 font-semibold" style={{ fontSize: '10px' }}>
              <HomeIcon className="w-3 h-3" />Hogar · {labelMes(mesVisible)}
            </div>
            {miembroAportes.map((m, i) => (
              <div key={m.id} className={`px-5 py-3 ${i < miembroAportes.length - 1 ? 'border-b border-stone-100' : ''}`}>
                <div className="flex items-center justify-between">
                  <div className="flex items-center gap-2.5">
                    <div className="w-1.5 h-7 rounded-full" style={{ background: m.color }} />
                    <div className="text-stone-900">{m.nombre}</div>
                  </div>
                  <div className="text-xs text-stone-500">
                    aportó <span className="text-stone-700 font-medium">{formatKm(m.aportado)}</span>
                    {' · '}usó <span className="text-stone-700 font-medium">{formatKm(m.recibido)}</span>
                  </div>
                </div>
              </div>
            ))}
            <div className="px-5 pb-3 pt-2 text-xs text-stone-500 italic">
              Aportes del hogar se reparten entre los conductores
            </div>
          </div>
        )}

        {/* BAR CHART */}
        {conductorBalances.some(c => c.consumo > 0) && (
          <div className="bg-white rounded-2xl border border-stone-200 mb-4 p-5">
            <div className="uppercase tracking-widest text-stone-500 font-semibold mb-3" style={{ fontSize: '10px' }}>Consumo de {labelMes(mesVisible)}</div>
            <div className="space-y-2.5">
              {conductorBalances.map(c => (
                <div key={c.id} className="flex items-center gap-3">
                  <div className="w-16 text-xs text-stone-700 truncate">{c.nombre}</div>
                  <div className="flex-1 bg-stone-100 rounded-full h-2.5 relative overflow-hidden">
                    <div className="absolute inset-y-0 left-0 rounded-full animate-growBar" style={{ width: `${Math.max((c.consumo / maxConsumo) * 100, 2)}%`, background: c.color }} />
                  </div>
                  <div className="w-20 text-xs text-stone-900 font-medium text-right tabular-nums">{formatKm(c.consumo)}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* MOVIMIENTOS (filtrados al mes visible) */}
        <Movimientos
          viajes={viajes.filter(v => v.fecha.startsWith(mesVisible))}
          cargas={cargas.filter(c => c.fecha.startsWith(mesVisible))}
          personas={personas} formatKm={formatKm}
          onEditViaje={startEditViaje} onEditCarga={startEditCarga} onDelete={requestDelete} />
      </div>

      {/* BOTONES */}
      <div className="fixed bottom-0 left-0 right-0 px-5 pb-6 pt-6" style={{ background: 'linear-gradient(to top, #FAF7F0 70%, rgba(250,247,240,0))' }}>
        <div className="max-w-md mx-auto flex gap-3">
          <button onClick={() => { setError(''); setEditingCarga(null); setCargaForm(initialCarga()); setShowCarga(true); }} className="flex-1 py-3.5 rounded-xl bg-white border-2 border-stone-900 font-medium text-sm text-stone-900 flex items-center justify-center gap-2 hover:bg-stone-50">
            <ReceiptIcon className="w-4 h-4" />Cargar
          </button>
          <button onClick={() => { setError(''); setEditingViaje(null); setViajeForm(initialViaje()); setMostrarAcompanantes(false); setShowViaje(true); }} className="flex-1 py-3.5 rounded-xl text-white font-medium text-sm flex items-center justify-center gap-2 hover:opacity-90" style={{ background: '#1c1917' }}>
            <PlusIcon className="w-4 h-4" strokeWidth={2.5} />Viaje
          </button>
        </div>
      </div>

      {/* MODAL CARGA */}
      {showCarga && (
        <Modal title={editingCarga ? 'Editar carga' : 'Registrar carga'} onClose={() => { setShowCarga(false); setShowCargaDetalles(false); setEditingCarga(null); }}>
          <div className="space-y-4">
            <Field label="¿Quién pagó?">
              <div className="space-y-2">
                {personas.map(p => (
                  <button key={p.id} onClick={() => setCargaForm({ ...cargaForm, pagado_por_id: p.id })} className="w-full py-2.5 px-3 rounded-lg text-sm font-medium border-2 transition-all flex items-center justify-between" style={{ borderColor: cargaForm.pagado_por_id === p.id ? p.color : '#e7e5e4', background: cargaForm.pagado_por_id === p.id ? p.color : 'white', color: cargaForm.pagado_por_id === p.id ? 'white' : '#1c1917' }}>
                    <span className="flex items-center gap-2">{p.tipo === 'conductor' ? <CarIcon className="w-3.5 h-3.5" /> : <HomeIcon className="w-3.5 h-3.5" />}{p.nombre}</span>
                    <span className="text-xs opacity-70 uppercase tracking-wider">{p.tipo === 'conductor' ? 'conductor' : 'hogar'}</span>
                  </button>
                ))}
              </div>
            </Field>
            <Field label="Tipo">
              <div className="grid grid-cols-3 gap-2">
                {[{v:'inicio_mes',l:'Inicio mes'},{v:'dia_20',l:'Día 20'},{v:'extra',l:'Extra'}].map(t => (
                  <button key={t.v} onClick={() => setCargaForm({ ...cargaForm, tipo: t.v })} className={`py-2.5 rounded-lg text-sm font-medium border-2 ${cargaForm.tipo === t.v ? 'bg-stone-900 text-white border-stone-900' : 'bg-white text-stone-900 border-stone-200'}`}>{t.l}</button>
                ))}
              </div>
              {cargaForm.tipo === 'extra' && (
                <p className="text-xs text-stone-500 mt-1.5 flex items-center gap-1">
                  <CoinIcon className="w-3 h-3" />El monto CLP de las cargas "extra" se acumula en el perfil de cada conductor
                </p>
              )}
            </Field>
            {configuracion.rendimiento_km_litro ? (
              <Field label={`Litros cargados (a ${configuracion.rendimiento_km_litro} km/L)`}>
                <input type="number" step="0.01" placeholder="35.5" value={cargaForm.litros} onChange={e => setCargaForm({ ...cargaForm, litros: e.target.value })} className="w-full px-4 py-3 rounded-lg border-2 border-stone-300 focus:border-stone-900 focus:outline-none font-body text-2xl font-display font-semibold text-center" />
                {cargaForm.litros && !editingCarga && (
                  <p className="text-xs text-stone-500 mt-1.5 text-center">
                    Aportarás <span className="font-medium text-stone-800">{formatKm(parseFloat(cargaForm.litros) * configuracion.rendimiento_km_litro)}</span> al pool
                  </p>
                )}
              </Field>
            ) : (
              <Field label="¿Cuántos km marca el tablero después de cargar?">
                <input type="number" step="0.1" placeholder="450" value={cargaForm.autonomia_despues} onChange={e => setCargaForm({ ...cargaForm, autonomia_despues: e.target.value })} className="w-full px-4 py-3 rounded-lg border-2 border-stone-300 focus:border-stone-900 focus:outline-none font-body text-2xl font-display font-semibold text-center" />
                {cargaForm.autonomia_despues && !editingCarga && (
                  <p className="text-xs text-stone-500 mt-1.5 text-center">
                    Aporte: <span className="font-medium text-stone-800">{formatKm(parseFloat(cargaForm.autonomia_despues) - nivelActual)}</span>
                  </p>
                )}
              </Field>
            )}
            <Field label="Fecha">
              <input type="date" value={cargaForm.fecha} onChange={e => setCargaForm({ ...cargaForm, fecha: e.target.value })} className="w-full px-4 py-2.5 rounded-lg border border-stone-300 focus:border-stone-900 focus:outline-none font-body" />
            </Field>
            <button type="button" onClick={() => setShowCargaDetalles(!showCargaDetalles)} className="text-xs text-stone-500 hover:text-stone-800 underline">
              {showCargaDetalles ? '− Ocultar detalles' : '+ Más detalles'}
            </button>
            {showCargaDetalles && (
              <div className="space-y-3 pl-3 border-l-2 border-stone-200">
                <Field label="Monto CLP (opcional)">
                  <input type="number" placeholder="40000" value={cargaForm.monto_clp} onChange={e => setCargaForm({ ...cargaForm, monto_clp: e.target.value })} className="w-full px-4 py-2.5 rounded-lg border border-stone-300 focus:border-stone-900 focus:outline-none font-body" />
                </Field>
                {!configuracion.rendimiento_km_litro && (
                  <Field label="Litros (opcional)">

              {ultima && ajusteValor !== '' && parseFloat(ajusteValor) !== Math.round(nivelActual) && (

// ==================== SELECTOR DE MES ====================
function SelectorMes({ mesVisible, mesesConDatos, mesActualSistema, onSelect }) {
  // Índice del mes visible dentro de la lista (que está de reciente a antiguo)
  const idx = mesesConDatos.indexOf(mesVisible);
  const hayMasReciente = idx > 0;            // hacia el presente
  const hayMasAntiguo = idx < mesesConDatos.length - 1; // hacia el pasado

  const irReciente = () => { if (hayMasReciente) onSelect(mesesConDatos[idx - 1]); };
  const irAntiguo = () => { if (hayMasAntiguo) onSelect(mesesConDatos[idx + 1]); };

  return (
    <div className="flex items-center gap-2">
      <button onClick={irAntiguo} disabled={!hayMasAntiguo}
        className="w-9 h-9 rounded-full bg-white border border-stone-200 flex items-center justify-center text-stone-600 disabled:opacity-30 hover:border-stone-400 flex-shrink-0">
        <ChevronLeftIcon className="w-4 h-4" />
      </button>

      <div className="flex-1 overflow-x-auto scroll-x">
        <div className="flex gap-2 justify-center min-w-min px-1">
          {mesesConDatos.map(m => {
            const activo = m === mesVisible;
            const esActual = m === mesActualSistema;
            return (
              <button key={m} onClick={() => onSelect(m)}
                className={`px-3 py-1.5 rounded-full text-xs font-medium whitespace-nowrap border transition-all ${activo ? 'bg-stone-900 text-white border-stone-900' : 'bg-white text-stone-600 border-stone-200 hover:border-stone-400'}`}>
                {labelMes(m)}{esActual && <span className={`ml-1 ${activo ? 'text-emerald-300' : 'text-emerald-600'}`}>•</span>}
              </button>
            );
          })}
        </div>
      </div>

      <button onClick={irReciente} disabled={!hayMasReciente}
        className="w-9 h-9 rounded-full bg-white border border-stone-200 flex items-center justify-center text-stone-600 disabled:opacity-30 hover:border-stone-400 flex-shrink-0">
        <ChevronRightIcon className="w-4 h-4" />
      </button>
    </div>
  );
}

// ==================== PERFIL DE PERSONA ====================
function PerfilPersona({ personaId, personas, conductores, cargas, viajes, miPersona, mesActualSistema, calcularBalancesParaMes, formatKm, formatClp, onVerOtro, onBack }) {
  const persona = personas.find(p => p.id === personaId);
  const esConductor = persona?.tipo === 'conductor';

  // Lista de meses con datos, de más antiguo a más reciente (para el gráfico)
  const mesesOrdenados = useMemo(() => {
    const set = new Set();
    cargas.forEach(c => set.add(c.fecha.slice(0, 7)));
    viajes.forEach(v => set.add(v.fecha.slice(0, 7)));
    set.add(mesActualSistema);
    return Array.from(set).sort(); // asc
  }, [cargas, viajes, mesActualSistema]);

  // Para cada mes, balance de TODOS los conductores (lo reutilizamos para comparar)
  const balancesPorMes = useMemo(() => {
    const out = {};
    mesesOrdenados.forEach(m => { out[m] = calcularBalancesParaMes(m); });
    return out;
  }, [mesesOrdenados, cargas, viajes, personas]);

  // Métricas de ESTA persona por mes (solo aplica completo a conductores)
  const filasMes = useMemo(() => {
    return mesesOrdenados.map(m => {
      const balMes = balancesPorMes[m] || [];
      const mio = balMes.find(b => b.id === personaId);
      if (esConductor && mio) {
        return {
          mes: m,
          km_usados: mio.consumo_propio,
          km_favores: mio.consumo_favor_compartido,
          clp_extra: mio.clp_extra,
          balance: mio.balance,
        };
      }
      // miembro de hogar: aportes y favores recibidos
      const aportado = cargas.filter(c => c.pagado_por_id === personaId && c.fecha.startsWith(m)).reduce((s, c) => s + Number(c.km_aportados), 0);
      const recibido = viajes.filter(v => v.es_favor && v.para_quien_id === personaId && v.fecha.startsWith(m)).reduce((s, v) => s + Number(v.km_recorridos), 0);
      const clp = cargas.filter(c => c.pagado_por_id === personaId && c.fecha.startsWith(m)).reduce((s, c) => s + (Number(c.monto_clp) || 0), 0);
      return { mes: m, km_usados: recibido, km_favores: 0, clp_extra: clp, balance: aportado - recibido, aportado, recibido, esHogar: true };
    });
  }, [mesesOrdenados, balancesPorMes, personaId, esConductor, cargas, viajes]);

  // Totales acumulados (todos los meses)
  const totales = useMemo(() => {
    return filasMes.reduce((acc, f) => ({
      km_usados: acc.km_usados + f.km_usados,
      km_favores: acc.km_favores + f.km_favores,
      clp_extra: acc.clp_extra + f.clp_extra,
      balance: acc.balance + f.balance,
    }), { km_usados: 0, km_favores: 0, clp_extra: 0, balance: 0 });
  }, [filasMes]);

  // Comparativa: promedio de los OTROS conductores (acumulado) para cada métrica
  const comparativa = useMemo(() => {
    if (!esConductor) return null;
    const otros = conductores.filter(c => c.id !== personaId);
    if (otros.length === 0) return null;
    const acumOtro = { km_usados: 0, km_favores: 0, clp_extra: 0, balance: 0 };
    mesesOrdenados.forEach(m => {
      const balMes = balancesPorMes[m] || [];
      otros.forEach(o => {
        const b = balMes.find(x => x.id === o.id);
        if (b) {
          acumOtro.km_usados += b.consumo_propio;
          acumOtro.km_favores += b.consumo_favor_compartido;
          acumOtro.clp_extra += b.clp_extra;
          acumOtro.balance += b.balance;
        }
      });
    });
    const n = otros.length;
    return {
      km_usados: acumOtro.km_usados / n,
      km_favores: acumOtro.km_favores / n,
      clp_extra: acumOtro.clp_extra / n,
      balance: acumOtro.balance / n,
    };
  }, [esConductor, conductores, personaId, mesesOrdenados, balancesPorMes]);

  // Máximo de km usados para escalar el gráfico
  const maxKmMes = Math.max(...filasMes.map(f => f.km_usados), 1);

  // Etiqueta de comparación (+/- vs promedio del resto)
  const Comp = ({ valor, promedio, unidad, invertirColor }) => {
    if (promedio == null) return null;
    const diff = valor - promedio;
    const casiIgual = Math.abs(diff) < (unidad === 'clp' ? 500 : 1);
    if (casiIgual) return <span className="text-stone-400" style={{ fontSize: '11px' }}>≈ igual que el resto</span>;
    const mas = diff > 0;
    // Para km usados, "más" es generalmente "peor" (usaste más auto); el color lo deja decidir el caller
    const color = invertirColor ? (mas ? '#BC4749' : '#52796F') : (mas ? '#52796F' : '#BC4749');
    const txt = unidad === 'clp' ? formatClp(Math.abs(diff)) : formatKm(Math.abs(diff));
    return (
      <span className="inline-flex items-center gap-1 font-medium" style={{ fontSize: '11px', color }}>
        {mas ? <TrendUpIcon className="w-3 h-3" /> : <TrendDownIcon className="w-3 h-3" />}
        {mas ? '+' : '−'}{txt} vs resto
      </span>
    );
  };

  return (
    <div className="min-h-screen w-full pb-12 font-body" style={{ background: '#FAF7F0' }}>
      {/* Header del perfil */}
      <div className="px-5 pt-8 pb-4">
        <button onClick={onBack} className="text-sm text-stone-600 mb-5 flex items-center gap-1 hover:text-stone-900">
          <ChevronLeftIcon className="w-4 h-4" />Volver al panel
        </button>
        <div className="flex items-center gap-3">
          <div className="w-14 h-14 rounded-2xl flex items-center justify-center flex-shrink-0" style={{ background: persona?.color }}>
            {esConductor ? <CarIcon className="w-6 h-6 text-white" /> : <HomeIcon className="w-6 h-6 text-white" />}
          </div>
          <div>
            <h1 className="font-display" style={{ fontWeight: 600, fontSize: '1.75rem', letterSpacing: '-0.02em', lineHeight: 1 }}>
              {persona?.nombre}{persona?.id === miPersona.id && <span className="text-sm text-stone-500 ml-2">(tú)</span>}
            </h1>
            <p className="text-xs text-stone-500 mt-1 uppercase tracking-widest font-semibold">{esConductor ? 'Conductor' : 'Miembro del hogar'} · histórico acumulado</p>
          </div>
        </div>
      </div>

      <div className="px-5 space-y-4">
        {/* TARJETAS DE TOTALES ACUMULADOS */}
        <div className="grid grid-cols-2 gap-3">
          <MetricCard
            label={esConductor ? 'Km usados (total)' : 'Km recibidos (favores)'}
            valor={formatKm(totales.km_usados)} color="#3D5A80"
            comp={esConductor && <Comp valor={totales.km_usados} promedio={comparativa?.km_usados} unidad="km" invertirColor />}
          />
          <MetricCard
            label="$$ bencina extra (total)"
            valor={formatClp(totales.clp_extra)} color="#E9C46A"
            comp={esConductor && <Comp valor={totales.clp_extra} promedio={comparativa?.clp_extra} unidad="clp" />}
          />
          {esConductor && (
            <MetricCard
              label="Km en favores al hogar"
              valor={formatKm(totales.km_favores)} color="#9D4EDD"
              comp={<Comp valor={totales.km_favores} promedio={comparativa?.km_favores} unidad="km" invertirColor />}
            />
          )}
          <MetricCard
            label="Balance neto (total)"
            valor={(totales.balance >= 0 ? '+' : '') + formatKm(totales.balance)}
            color={totales.balance >= 0 ? '#52796F' : '#BC4749'}
            comp={esConductor && <Comp valor={totales.balance} promedio={comparativa?.balance} unidad="km" />}
          />
        </div>

        {/* GRÁFICO DE KM POR MES */}
        <div className="bg-white rounded-2xl border border-stone-200 p-5">
          <div className="uppercase tracking-widest text-stone-500 font-semibold mb-4 flex items-center gap-1.5" style={{ fontSize: '10px' }}>
            <TrendUpIcon className="w-3 h-3" />{esConductor ? 'Km usados por mes' : 'Km recibidos por mes'}
          </div>
          {filasMes.every(f => f.km_usados === 0) ? (
            <p className="text-sm text-stone-400 italic text-center py-6">Aún sin datos para graficar.</p>
          ) : (
            <div className="flex items-end justify-between gap-2" style={{ height: '160px' }}>
              {filasMes.map(f => {
                const h = Math.max((f.km_usados / maxKmMes) * 130, f.km_usados > 0 ? 6 : 2);
                const esActual = f.mes === mesActualSistema;
                return (
                  <div key={f.mes} className="flex-1 flex flex-col items-center justify-end gap-1.5 h-full">
                    <div className="text-stone-700 font-medium tabular-nums" style={{ fontSize: '10px' }}>{Math.round(f.km_usados)}</div>
                    <div className="w-full rounded-t-lg animate-fadeInUp" style={{ height: `${h}px`, background: persona?.color, opacity: esActual ? 1 : 0.55, maxWidth: '44px', margin: '0 auto' }} />
                    <div className={`text-center ${esActual ? 'text-stone-900 font-semibold' : 'text-stone-400'}`} style={{ fontSize: '9px' }}>{labelMesCorto(f.mes)}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* DESGLOSE MES A MES */}
        <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
          <div className="px-5 pt-4 pb-2 uppercase tracking-widest text-stone-500 font-semibold" style={{ fontSize: '10px' }}>Desglose mes a mes</div>
          {[...filasMes].reverse().map((f, i, arr) => (
            <div key={f.mes} className={`px-5 py-3 ${i < arr.length - 1 ? 'border-b border-stone-100' : ''}`}>
              <div className="flex items-center justify-between mb-1">
                <div className="font-medium text-stone-900 text-sm flex items-center gap-2">
                  {labelMes(f.mes)}
                  {f.mes === mesActualSistema && <span className="text-emerald-600 text-xs">• en curso</span>}
                </div>
                <div className={`font-display tabular-nums ${f.balance < 0 ? 'text-red-600' : f.balance > 0 ? 'text-emerald-700' : 'text-stone-500'}`} style={{ fontWeight: 600, fontSize: '0.95rem' }}>
                  {f.balance >= 0 ? '+' : ''}{formatKm(f.balance)}
                </div>
              </div>
              <div className="text-xs text-stone-500">
                {esConductor ? (
                  <>usó <span className="text-stone-700 font-medium">{formatKm(f.km_usados)}</span>
                  {f.km_favores > 0 && <> · favores <span className="text-stone-700 font-medium">{formatKm(f.km_favores)}</span></>}
                  {f.clp_extra > 0 && <> · extra <span className="text-stone-700 font-medium">{formatClp(f.clp_extra)}</span></>}</>
                ) : (
                  <>aportó <span className="text-stone-700 font-medium">{formatKm(f.aportado || 0)}</span> · recibió <span className="text-stone-700 font-medium">{formatKm(f.recibido || 0)}</span>
                  {f.clp_extra > 0 && <> · {formatClp(f.clp_extra)}</>}</>
                )}
              </div>
            </div>
          ))}
        </div>

        {/* COMPARAR CON OTROS CONDUCTORES */}
        {conductores.length > 1 && (
          <div className="bg-white rounded-2xl border border-stone-200 p-5">
            <div className="uppercase tracking-widest text-stone-500 font-semibold mb-3" style={{ fontSize: '10px' }}>Ver perfil de otro conductor</div>
            <div className="flex gap-2 flex-wrap">
              {conductores.filter(c => c.id !== personaId).map(c => (
                <button key={c.id} onClick={() => onVerOtro(c.id)} className="px-3 py-2 rounded-lg text-sm font-medium border-2 flex items-center gap-2 hover:opacity-90" style={{ borderColor: c.color, color: c.color }}>
                  <div className="w-2 h-2 rounded-full" style={{ background: c.color }} />{c.nombre}
                </button>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function MetricCard({ label, valor, color, comp }) {
  return (
    <div className="bg-white rounded-2xl border border-stone-200 p-4 flex flex-col justify-between">
      <div className="flex items-center gap-1.5 mb-2">
        <div className="w-2 h-2 rounded-full" style={{ background: color }} />
        <div className="uppercase tracking-widest text-stone-500 font-semibold" style={{ fontSize: '9px' }}>{label}</div>
      </div>
      <div className="font-display tabular-nums text-stone-900" style={{ fontWeight: 600, fontSize: '1.4rem', letterSpacing: '-0.01em', lineHeight: 1.1 }}>{valor}</div>
      {comp && <div className="mt-1.5">{comp}</div>}
    </div>
  );
}

// ==================== MOVIMIENTOS ====================
function Movimientos({ viajes, cargas, personas, formatKm, onEditViaje, onEditCarga, onDelete }) {
  const movimientos = useMemo(() => {
    const m = [
      ...viajes.map(v => ({ tipo: 'viaje', id: 'v' + v.id, raw: v, fecha: v.fecha, created_at: v.created_at, km: Number(v.km_recorridos), persona_id: v.conductor_id, descripcion: v.descripcion, es_favor: v.es_favor, para_quien_id: v.para_quien_id, acompanantes_ids: v.acompanantes_ids || [], updated_at: v.updated_at, updated_by_id: v.updated_by_id })),
      ...cargas.map(c => ({ tipo: 'carga', id: 'c' + c.id, raw: c, fecha: c.fecha, created_at: c.created_at, km: Number(c.km_aportados), persona_id: c.pagado_por_id, descripcion: c.tipo, autonomia_despues: c.autonomia_despues, monto_clp: c.monto_clp, updated_at: c.updated_at, updated_by_id: c.updated_by_id }))
    ];
    return m.sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 30);
  }, [viajes, cargas]);

  return (
    <div className="bg-white rounded-2xl border border-stone-200 overflow-hidden">
      <div className="px-5 pt-4 pb-2 uppercase tracking-widest text-stone-500 font-semibold" style={{ fontSize: '10px' }}>Movimientos</div>
      {movimientos.length === 0 ? (
        <div className="px-5 py-8 text-center text-sm text-stone-500"><p>Aún sin movimientos este mes.</p></div>
      ) : (
        movimientos.map((m, i) => {
          const persona = personas.find(p => p.id === m.persona_id);
          const editor = m.updated_by_id ? personas.find(p => p.id === m.updated_by_id) : null;
          const paraQ = m.para_quien_id ? personas.find(p => p.id === m.para_quien_id) : null;
          const titulo = m.tipo === 'carga'
            ? `Carga · ${m.descripcion?.replace('_', ' ')} · llegó a ${Math.round(m.autonomia_despues)} km`
            : (m.es_favor && paraQ ? `Favor para ${paraQ.nombre}` : (m.descripcion || 'Viaje'));
          return (
            <div key={m.id} className={`px-5 py-3 flex items-center gap-3 ${i < movimientos.length - 1 ? 'border-b border-stone-100' : ''}`}>
              <div className="w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0" style={{ background: m.tipo === 'carga' ? '#E9C46A' : persona?.color || '#999' }}>
                {m.tipo === 'carga' ? <PlusIcon className="w-4 h-4 text-stone-900" strokeWidth={2.5} /> : <FuelIcon className="w-4 h-4 text-white" />}
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium text-stone-900 truncate">{titulo}</div>
                <div className="text-xs text-stone-500">
                  {persona?.nombre}
                  {m.acompanantes_ids && m.acompanantes_ids.length > 0 && <span> + {m.acompanantes_ids.map(id => personas.find(p => p.id === id)?.nombre).filter(Boolean).join(', ')}</span>}
                  {' · '}{new Date(m.fecha + 'T12:00:00').toLocaleDateString('es-CL', { weekday: 'short', day: 'numeric', month: 'short' })}
                  {m.tipo === 'carga' && m.monto_clp ? ` · $${m.monto_clp.toLocaleString('es-CL')}` : ''}
                </div>
                {editor && m.updated_at && (
                  <div className="text-stone-400 italic mt-0.5" style={{ fontSize: '10px' }}>
                    editado por {editor.nombre} el {new Date(m.updated_at).toLocaleDateString('es-CL', { weekday: 'short', day: 'numeric', month: 'short' })}
                  </div>
                )}
              </div>
              <div className="flex items-center gap-1">
                <div className={`text-sm font-semibold tabular-nums ${m.tipo === 'carga' ? 'text-emerald-700' : 'text-stone-900'} mr-1`}>
                  {m.tipo === 'carga' ? '+' : '−'}{formatKm(m.km)}
                </div>
                <button onClick={() => m.tipo === 'carga' ? onEditCarga(m.raw) : onEditViaje(m.raw)} className="p-1.5 text-stone-400 hover:text-stone-800 rounded">
                  <EditIcon className="w-3.5 h-3.5" />
                </button>
                <button onClick={() => onDelete(m.tipo, m.raw)} className="p-1.5 text-stone-400 hover:text-red-600 rounded">
                  <TrashIcon className="w-3.5 h-3.5" />
                </button>
              </div>
            </div>
          );
        })
      )}
    </div>
  );
}

function Modal({ title, children, onClose }) {
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center font-body" style={{ background: 'rgba(0,0,0,0.5)' }}>
      <div className="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl p-6 max-h-[90vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-5">
          <h2 className="font-display" style={{ fontWeight: 600, fontSize: '1.5rem', letterSpacing: '-0.01em' }}>{title}</h2>
          <button onClick={onClose} className="w-9 h-9 rounded-full bg-stone-100 flex items-center justify-center hover:bg-stone-200"><XIcon className="w-4 h-4" /></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <label className="block font-semibold text-stone-700 mb-1.5 uppercase tracking-widest" style={{ fontSize: '10px' }}>{label}</label>
      {children}
    </div>
  );
}

function ErrorBox({ msg }) {
  return (
    <div className="flex gap-2 p-3 bg-red-50 border border-red-200 rounded-lg text-xs text-red-800">
      <AlertIcon className="w-4 h-4 flex-shrink-0 mt-0.5" />
      <span className="break-words">{msg}</span>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BencinaApp />);
</script>
</body>
